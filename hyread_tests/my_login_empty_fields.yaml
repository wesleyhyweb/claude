appId: com.hyread.reader.v3
---
# TC-004: HyRead 電子書店 - 登入驗證（空白欄位）
- launchApp:
    appId: com.hyread.reader.v3
    clearState: true

- waitForAnimationToEnd

# 點選功能導覽「下一頁」
- tapOn: 下一頁
- tapOn: 下一頁

# 關閉功能導覽頁
- tapOn: 關閉


- tapOn:
    text: "我的"
- waitForAnimationToEnd

- tapOn:
    text: "HyRead 電子書店_登入"
- waitForAnimationToEnd

- assertVisible:
    text: "使用HyRead帳號登入"

# 不輸入任何資料，直接點擊登入
- tapOn:
    text: "登入"
- waitForAnimationToEnd

# 驗證仍停留在登入頁（應顯示必填提示）
- assertVisible:
    text: "使用HyRead帳號登入"
