# TC-AI-007: 書籍詳情頁面與 AI 推薦分頁
# 從搜尋結果點入書籍，驗證詳情頁各分頁（館藏資訊、簡介、目錄、系列書、AI 推薦）
# 以及借閱資訊呈現正確
#
# 注意：本測試需搭配 run_AIBookDetail.sh 執行，
# 由外部 Python 腳本完成中文搜尋輸入（Android 15 限制），
# Maestro 負責從搜尋結果開始驗證後續流程。

# 確認已在書籍詳情頁（由外部腳本導航、搜尋、點擊書封、點擊查看後才執行此流程）
# 驗證書籍詳情頁至少有一個分頁（簡介、目次、推薦書籍 其中之一）
- assertVisible: "簡介"
